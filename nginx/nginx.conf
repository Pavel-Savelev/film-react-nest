server {
    listen 80;
    server_name production-test.nomorepartiessite.ru; 

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3000/;
    }

    location /content/ {
        proxy_pass http://backend:3000/content/;
    }
}