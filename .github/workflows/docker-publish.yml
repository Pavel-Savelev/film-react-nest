name: Build and Push Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        run: |
          docker build -t ghcr.io/pavel-savelev/film-frontend:latest ./frontend
          docker push ghcr.io/pavel-savelev/film-frontend:latest

      - name: Build and push backend
        run: |
          docker build -t ghcr.io/pavel-savelev/film-backend:latest ./backend
          docker push ghcr.io/pavel-savelev/film-backend:latest

      - name: Build and push nginx
        run: |
          docker build -t ghcr.io/pavel-savelev/film-nginx:latest ./nginx
          docker push ghcr.io/pavel-savelev/film-nginx:latest